# Debian 12 (bookworm)

family: debian
version: "12"

boot_image:
  kernel: images/debian/12/install.amd/linux
  initrd: images/debian/12/install.amd/initrd.gz
  repo: images/debian/12/

boot_template: templates/debian/boot.ipxe.tmpl

# Debian uses a single preseed.cfg.
configs:
  - template: templates/debian/preseed.cfg.tmpl
    filename: preseed.cfg

# Debian package set. Listed as a flat list because preseed expects
# space-separated package names in pkgsel/include.
packages:
  - openssh-server
  - sudo
  - vim
  - curl
  - wget
  - net-tools
  - bind9-host
  - pciutils
  - chrony
  - ca-certificates

# Debian does not have an explicit "exclude" concept in preseed in the
# same way kickstart does. We render this list as tasksel skip lines.
exclude_packages: []

timezone: Asia/Tokyo
ntp_server: ntp.nict.jp
keyboard: jp
language: en_US.UTF-8

# Post-install scripts. Listed in the order the preseed late_command
# fetches and executes them.
setup:
  post:
    - templates/setup/post/udev.sh.tmpl
    - templates/setup/post/network.sh.tmpl
    - templates/setup/post/ssh.sh.tmpl
    - templates/setup/post/complete.sh.tmpl
