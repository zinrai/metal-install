# Ubuntu 24.04 LTS (noble)

family: ubuntu
version: "24.04"

boot_image:
  kernel: images/ubuntu/24.04/casper/vmlinuz
  initrd: images/ubuntu/24.04/casper/initrd
  repo: images/ubuntu/24.04/

boot_template: templates/ubuntu/boot.ipxe.tmpl

# Ubuntu autoinstall uses cloud-init's nocloud-net data source, which
# requires the URL to point to a directory containing BOTH user-data
# and meta-data. Render both files into the per-node directory so the
# boot template can pass ds=nocloud-net;s=<dir>/.
configs:
  - template: templates/ubuntu/user-data.tmpl
    filename: user-data
  - template: templates/ubuntu/meta-data.tmpl
    filename: meta-data

packages:
  - openssh-server
  - sudo
  - vim
  - curl
  - wget
  - net-tools
  - bind9-host
  - pciutils
  - chrony
  - ca-certificates

exclude_packages: []

timezone: Asia/Tokyo
ntp_server: ntp.nict.jp
keyboard: jp
language: en_US.UTF-8

# Post-install scripts. Listed in the order the autoinstall
# late-commands section fetches and executes them.
setup:
  post:
    - templates/setup/post/udev.sh.tmpl
    - templates/setup/post/network.sh.tmpl
    - templates/setup/post/ssh.sh.tmpl
    - templates/setup/post/complete.sh.tmpl
