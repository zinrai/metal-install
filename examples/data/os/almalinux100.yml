# AlmaLinux 10.0 (RHEL family)

family: rhel
version: "10.0"

# kernel and initrd are fetched from the install server. The repo is pulled
# online during the install (like Debian's online mirror), so the whole BaseOS
# tree is not mirrored locally. inst.repo in the boot template uses this full
# URL as-is.
boot_image:
  kernel: images/almalinux/10.0/images/pxeboot/vmlinuz
  initrd: images/almalinux/10.0/images/pxeboot/initrd.img
  repo: https://repo.almalinux.org/almalinux/10/BaseOS/x86_64/os/

boot_template: templates/rhel/boot.ipxe.tmpl

configs:
  - template: templates/rhel/kickstart.ks.tmpl
    filename: kickstart.ks

# Minimal BaseOS set so no AppStream repo is needed. @core provides curl-minimal
# (the curl binary the %post script uses).
packages:
  - "@core"
  - openssh-server

exclude_packages: []

timezone: Asia/Tokyo
ntp_server: ntp.nict.jp
keyboard: jp106
language: en_US.UTF-8

setup:
  post:
    - templates/setup/post/ssh.sh.tmpl
