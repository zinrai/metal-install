# Valid combinations of Machine and OS.
#
# A combination not listed here cannot be installed. The validation
# step rejects InstallSpec referencing an undeclared combination.
#
# Entries are grouped to make "this OS supports these machines"
# explicit. Group structure has no semantic meaning beyond grouping.

- machines: [r660_10g, dl380_gen10]
  os: [almalinux100, debian12, ubuntu2404]
