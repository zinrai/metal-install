# HPE ProLiant DL380 Gen10 (10G NIC)
#
# This file declares everything specific to this machine model.
# Read this file alone to understand what gets installed on this machine.

bmc_type: ilo5

# NIC: PCI bus address to interface name mapping.
# Note that PCI addresses differ from Dell R660 even though both are
# "10G NIC machines". This is intentional: we do not share NIC
# definitions across machine models.
nics:
  - { pci: "0000:03:00.0", name: ens1f0 }
  - { pci: "0000:03:00.1", name: ens1f1 }
  - { pci: "0000:03:00.2", name: ens1f2 }
  - { pci: "0000:03:00.3", name: ens1f3 }
  - { pci: "0000:04:00.0", name: ens2f0 }
  - { pci: "0000:04:00.1", name: ens2f1 }

bonds:
  - name: bond0
    members: [ens1f0, ens1f1]
    role: wan
  - name: bond1
    members: [ens2f0, ens2f1]
    role: lan

unused_nics: [ens1f2, ens1f3]

# Kernel parameters differ from R660. HPE Gen10 needs specific
# settings around IOMMU and the iLO serial console.
kernel_params:
  - intel_idle.max_cstate=0
  - processor.max_cstate=0
  - nomodeset
  - consoleblank=0
  - intel_iommu=on

# HPE uses ssacli (not perccli) for storage controller management.
extra_packages:
  - name: ssacli
    rpm: additionals/ssacli-6.30-14.0.x86_64.rpm
    symlink_from: /opt/smartstorageadmin/ssacli/bin/ssacli
    symlink_to: /usr/sbin/ssacli

# Partition layout. HP DL380 Gen10 with Smart Array exposes the boot
# logical drive as /dev/sda. ESP + /boot + swap + /, GPT, no LVM.
partition:
  kickstart: |
    clearpart --all --drives=/dev/sda
    part /boot/efi --fstype=efi --size=512  --ondisk=/dev/sda
    part /boot     --fstype=xfs --size=1024 --ondisk=/dev/sda
    part swap                   --size=8192 --ondisk=/dev/sda
    part /         --fstype=xfs --grow      --ondisk=/dev/sda
  preseed: |
    d-i partman-auto/disk string /dev/sda
    d-i partman-auto/method string regular
    d-i partman-auto/expert_recipe string                         \
      boot-root ::                                                \
        512  512  512  free                                       \
          $iflabel{ gpt } $reusemethod{ }                         \
          method{ efi } format{ } .                               \
        1024 1024 1024 xfs                                        \
          $primary{ } $bootable{ }                                \
          method{ format } format{ }                              \
          use_filesystem{ } filesystem{ xfs }                     \
          mountpoint{ /boot } .                                   \
        8192 8192 8192 linux-swap                                 \
          method{ swap } format{ } .                              \
        -1   1000 -1   xfs                                        \
          $primary{ }                                             \
          method{ format } format{ }                              \
          use_filesystem{ } filesystem{ xfs }                     \
          mountpoint{ / } .
    d-i partman-partitioning/confirm_write_new_label boolean true
    d-i partman/choose_partition select finish
    d-i partman/confirm boolean true
    d-i partman/confirm_nooverwrite boolean true
  autoinstall: |
    storage:
      config:
        - {type: disk, id: disk0, path: /dev/sda, ptable: gpt, wipe: superblock-recursive, grub_device: false}
        - {type: partition, id: efi,  device: disk0, size: 512M, flag: boot}
        - {type: format,    id: fs-efi,  volume: efi,  fstype: fat32}
        - {type: mount,     id: mnt-efi, device: fs-efi, path: /boot/efi}
        - {type: partition, id: boot, device: disk0, size: 1G}
        - {type: format,    id: fs-boot,  volume: boot, fstype: xfs}
        - {type: mount,     id: mnt-boot, device: fs-boot, path: /boot}
        - {type: partition, id: swap, device: disk0, size: 8G}
        - {type: format,    id: fs-swap,  volume: swap, fstype: swap}
        - {type: mount,     id: mnt-swap, device: fs-swap, path: ""}
        - {type: partition, id: root, device: disk0, size: -1}
        - {type: format,    id: fs-root,  volume: root, fstype: xfs}
        - {type: mount,     id: mnt-root, device: fs-root, path: /}
