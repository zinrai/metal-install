# Install server environment.
# These values are specific to the deployment, not the data model.

install_server:
  # HTTP base URL used in iPXE scripts and installer config URLs.
  # The IP 192.0.2.1 is from the RFC 5737 documentation range
  # (TEST-NET-1). Replace with your deployment's address.
  http_base: "http://192.0.2.1"
