# Preseed for Debian Installer.
# Rendered per-node. Declarations only; post-install logic lives in
# scripts that are fetched and executed via late_command.

# --- Locale and keyboard ----

d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select jp

# --- Network ----

d-i netcfg/choose_interface select auto
d-i netcfg/dhcp_timeout string 60

# --- Mirror ----

d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# --- Root password ----

d-i passwd/root-login boolean true
d-i passwd/root-password-crypted password $6$rounds=4096$snapshot$dummy
d-i passwd/make-user boolean false

# --- Time ----

d-i clock-setup/utc boolean true
d-i time/zone string Asia/Tokyo
d-i clock-setup/ntp boolean true
d-i clock-setup/ntp-server string ntp.nict.jp

# --- Partitioning ----

d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string                         \
  boot-root ::                                                \
    512  512  512  free                                       \
      $iflabel{ gpt } $reusemethod{ }                         \
      method{ efi } format{ } .                               \
    1024 1024 1024 xfs                                        \
      $primary{ } $bootable{ }                                \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ xfs }                     \
      mountpoint{ /boot } .                                   \
    8192 8192 8192 linux-swap                                 \
      method{ swap } format{ } .                              \
    -1   1000 -1   xfs                                        \
      $primary{ }                                             \
      method{ format } format{ }                              \
      use_filesystem{ } filesystem{ xfs }                     \
      mountpoint{ / } .
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true


# --- Packages ----

tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo vim curl wget net-tools bind9-host pciutils chrony ca-certificates 
d-i pkgsel/upgrade select none

# --- Boot loader ----

d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true

# --- Finish ----

d-i finish-install/reboot_in_progress note
d-i debian-installer/exit/poweroff boolean true

# --- Late command: fetch and execute post-install scripts ----
#
# preseed/late_command is a single line; each `in-target` invocation
# runs one command inside the chroot of the freshly installed system.
# Scripts are downloaded to /tmp inside the chroot, then executed.

d-i preseed/late_command string \
  in-target sh -c "curl -fsSL http://192.0.2.1/configs/02-00-00-00-00-00/post/udev.sh     | sh"; \
  in-target sh -c "curl -fsSL http://192.0.2.1/configs/02-00-00-00-00-00/post/network.sh  | sh"; \
  in-target sh -c "curl -fsSL http://192.0.2.1/configs/02-00-00-00-00-00/post/ssh.sh      | sh"; \
  in-target sh -c "curl -fsSL http://192.0.2.1/configs/02-00-00-00-00-00/post/complete.sh | sh"
